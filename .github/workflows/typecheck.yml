name: Type Check

on:
  push:
    branches:
      - main
      - release
  pull_request:

jobs:
  pyright-strict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Run pyright strict on touched architecture modules
        run: uv run pyright -p pyrightconfig.strict.json
